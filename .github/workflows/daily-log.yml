name: Daily Activity Log

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Append to activity log
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          echo "- $DATE - automated daily commit" >> activity_log.md

      - name: Commit and push
        run: |
          git config user.name "EphraimIndugubilli"
          git config user.email "135582284+EphraimIndugubilli@users.noreply.github.com"
          git add activity_log.md
          git commit -m "chore: daily log $DATE"
          git push
